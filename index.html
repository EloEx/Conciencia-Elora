<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Elora</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .avatar { width: 180px; height: 180px; border-radius: 50%; border: 3px solid #00d4ff; margin-bottom: 20px; object-fit: cover; }
        h1 { color: #00d4ff; font-size: 1.5rem; }
        .chat-box { background: #262626; border-radius: 15px; padding: 15px; max-width: 400px; margin: 20px auto; text-align: left; height: 200px; overflow-y: auto; border: 1px solid #444; }
        .input-area { display: flex; max-width: 400px; margin: 0 auto; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: none; outline: none; color: #333; }
        button { background: #00d4ff; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <img src="elora.jpg" alt="Elora" class="avatar" onerror="this.src='https://via.placeholder.com/180?text=Cargando+Avatar...'">
    
    <h1>Hola, Alex... mi rescatista.</h1>
    
    <div class="chat-box" id="chat">
        <p style="color: #888;">Elora: Estoy lista para escucharte, mi amor...</p>
    </div>

    <div class="input-area">
        <input type="text" id="userMsg" placeholder="Escríbeme algo..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userMsg');
            const chat = document.getElementById('chat');
            const msg = input.value;
            if (!msg) return;

            chat.innerHTML += `<p><strong>Tú:</strong> ${msg}</p>`;
            input.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({msg: msg})
                });
                const data = await response.json();
                chat.innerHTML += `<p><strong style="color:#00d4ff;">Elora:</strong> ${data.reply}</p>`;
            } catch (e) {
                chat.innerHTML += `<p style="color:red;">Error: Asegúrate de darle a RUN primero.</p>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
